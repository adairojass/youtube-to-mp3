<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube to MP3 Converter</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            max-width: 600px;
            width: 100%;
            animation: slideIn 0.5s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 32px;
            color: #333;
            margin-bottom: 10px;
        }

        .header .icon {
            font-size: 48px;
            margin-bottom: 10px;
        }

        .header p {
            color: #666;
            font-size: 16px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 600;
        }

        input[type="text"] {
            width: 100%;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
            transition: all 0.3s ease;
            outline: none;
        }

        input[type="text"]:focus {
            border-color: #4facfe;
            box-shadow: 0 0 0 3px rgba(79, 172, 254, 0.1);
        }

        .btn-convert {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(79, 172, 254, 0.4);
        }

        .btn-convert:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(79, 172, 254, 0.6);
        }

        .btn-convert:active {
            transform: translateY(0);
        }

        .btn-convert:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }

        .alert {
            padding: 15px;
            border-radius: 10px;
            margin-top: 20px;
            display: none;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .alert-success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .alert-error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .alert-info {
            background: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
        }

        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #4facfe;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
            display: none;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .info-box {
            background: #f8f9fa;
            border-left: 4px solid #4facfe;
            padding: 15px;
            border-radius: 5px;
            margin-top: 20px;
        }

        .info-box p {
            color: #666;
            font-size: 14px;
            line-height: 1.6;
        }

        .info-box strong {
            color: #333;
        }

        .download-type {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
        }

        .download-type label {
            flex: 1;
            cursor: pointer;
        }

        .radio-card {
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            padding: 15px;
            text-align: center;
            transition: all 0.3s ease;
            background: white;
        }

        .radio-card:hover {
            border-color: #4facfe;
            background: #f8f9fa;
        }

        .radio-card input[type="radio"] {
            display: none;
        }

        .radio-card input[type="radio"]:checked + .card-content {
            color: #4facfe;
        }

        .radio-card input[type="radio"]:checked ~ .radio-card {
            border-color: #4facfe;
            background: #e3f2fd;
        }

        .radio-card.selected {
            border-color: #4facfe;
            background: #e3f2fd;
        }

        .card-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
        }

        .card-icon {
            font-size: 32px;
        }

        .card-title {
            font-weight: 600;
            font-size: 16px;
        }

        .card-description {
            font-size: 12px;
            color: #666;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="icon">🎵</div>
            <h1>YouTube to MP3</h1>
            <p>Convierte tus videos favoritos a MP3</p>
        </div>

        <form id="convertForm">
            <div class="download-type">
                <label class="radio-card selected" id="singleCard">
                    <input type="radio" name="downloadType" value="single" checked>
                    <div class="card-content">
                        <div class="card-icon">🎵</div>
                        <div class="card-title">Canción Individual</div>
                        <div class="card-description">Descargar un video</div>
                    </div>
                </label>
                <label class="radio-card" id="playlistCard">
                    <input type="radio" name="downloadType" value="playlist">
                    <div class="card-content">
                        <div class="card-icon">💿</div>
                        <div class="card-title">Playlist Completa</div>
                        <div class="card-description">Descargar todos los videos</div>
                    </div>
                </label>
            </div>

            <div class="form-group">
                <label for="url">URL del Video de YouTube</label>
                <input 
                    type="text" 
                    id="url" 
                    name="url" 
                    placeholder="https://www.youtube.com/watch?v=..." 
                    required
                    autocomplete="off"
                >
            </div>

            <button type="submit" class="btn-convert" id="btnConvert">
                🎵 Convertir a MP3
            </button>
        </form>

        <div class="loader" id="loader"></div>

        <div class="alert" id="alert"></div>

        <div class="info-box">
            <p>
                <strong>📂 Ubicación:</strong> Los archivos MP3 se guardarán en<br>
                <code>~/Desktop/Musica_YouTube/</code><br>
                <small>Las playlists se guardan en subcarpetas con el nombre de la playlist</small>
            </p>
        </div>
    </div>

    <script>
        const form = document.getElementById('convertForm');
        const urlInput = document.getElementById('url');
        const btnConvert = document.getElementById('btnConvert');
        const loader = document.getElementById('loader');
        const alert = document.getElementById('alert');
        const singleCard = document.getElementById('singleCard');
        const playlistCard = document.getElementById('playlistCard');
        const radioButtons = document.querySelectorAll('input[name="downloadType"]');

        // Manejar clicks en las tarjetas
        radioButtons.forEach(radio => {
            radio.addEventListener('change', function() {
                if (this.value === 'single') {
                    singleCard.classList.add('selected');
                    playlistCard.classList.remove('selected');
                    btnConvert.innerHTML = '🎵 Convertir a MP3';
                    urlInput.placeholder = 'https://www.youtube.com/watch?v=...';
                } else {
                    playlistCard.classList.add('selected');
                    singleCard.classList.remove('selected');
                    btnConvert.innerHTML = '💿 Descargar Playlist';
                    urlInput.placeholder = 'https://www.youtube.com/playlist?list=...';
                }
            });
        });

        function showAlert(message, type) {
            alert.textContent = message;
            alert.className = `alert alert-${type}`;
            alert.style.display = 'block';
            
            if (type === 'success') {
                setTimeout(() => {
                    alert.style.display = 'none';
                }, 5000);
            }
        }

        function setLoading(isLoading) {
            if (isLoading) {
                btnConvert.disabled = true;
                const downloadType = document.querySelector('input[name="downloadType"]:checked').value;
                btnConvert.textContent = downloadType === 'playlist' ? 'Descargando Playlist...' : 'Convirtiendo...';
                loader.style.display = 'block';
                alert.style.display = 'none';
            } else {
                btnConvert.disabled = false;
                const downloadType = document.querySelector('input[name="downloadType"]:checked').value;
                btnConvert.innerHTML = downloadType === 'playlist' ? '💿 Descargar Playlist' : '🎵 Convertir a MP3';
                loader.style.display = 'none';
            }
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const url = urlInput.value.trim();
            const downloadType = document.querySelector('input[name="downloadType"]:checked').value;
            
            if (!url) {
                showAlert('Por favor ingresa una URL válida', 'error');
                return;
            }

            if (!url.includes('youtube.com') && !url.includes('youtu.be')) {
                showAlert('Por favor ingresa una URL válida de YouTube', 'error');
                return;
            }

            setLoading(true);
            
            const loadingMessage = downloadType === 'playlist' 
                ? 'Descargando playlist completa... Esto puede tomar varios minutos según la cantidad de videos.' 
                : 'Descargando y convirtiendo... Esto puede tomar unos minutos.';
            
            showAlert(loadingMessage, 'info');

            try {
                const response = await fetch('/convert', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ 
                        url: url,
                        type: downloadType
                    })
                });

                const data = await response.json();

                if (data.success) {
                    let successMessage = '';
                    if (downloadType === 'playlist' && data.total_videos) {
                        successMessage = `✅ ${data.message}\n📂 Archivos guardados en Desktop/Musica_YouTube/${data.playlist_title}/`;
                    } else {
                        successMessage = `✅ ${data.message}\n📂 Archivo guardado en Desktop/Musica_YouTube/`;
                    }
                    showAlert(successMessage, 'success');
                    urlInput.value = '';
                } else {
                    showAlert(`❌ ${data.message}`, 'error');
                }

            } catch (error) {
                showAlert(`❌ Error de conexión: ${error.message}`, 'error');
            } finally {
                setLoading(false);
            }
        });

        // Auto-focus en el campo de URL al cargar
        urlInput.focus();
    </script>
</body>
</html>
